{% extends "base.html" %}
{% block title %}Sign up - Folio{% endblock %}
{% block body %}
<div class="card">
  <h1>Create your account</h1>
  <p class="sub">New accounts start with free credits so you can try Folio right away.</p>
  <form method="post">
    <label for="email">Email</label>
    <input id="email" name="email" type="email" required>
    <label for="password">Password <span class="muted">(at least 8 characters)</span></label>
    <input id="password" name="password" type="password" required>
    <button type="submit">Sign up</button>
  </form>
  <p class="muted" style="margin-top:14px">Already have an account?
    <a class="link" href="{{ url_for('auth.login') }}">Log in</a>.</p>
</div>
{% endblock %}
