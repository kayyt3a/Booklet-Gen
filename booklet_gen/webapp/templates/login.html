{% extends "base.html" %}
{% block title %}Log in - Folio{% endblock %}
{% block body %}
<div class="card">
  <h1>Log in</h1>
  <form method="post">
    <label for="email">Email</label>
    <input id="email" name="email" type="email" required>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" required>
    <button type="submit">Log in</button>
  </form>
  <p class="muted" style="margin-top:14px">No account?
    <a class="link" href="{{ url_for('auth.signup') }}">Sign up</a>.</p>
</div>
{% endblock %}
