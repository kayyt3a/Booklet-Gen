<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Booklet Generator</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --ink: #1c2434;
      --muted: #6b7280;
      --accent: #1f3a5f;
      --accent-hover: #16273f;
      --border: #e2e6ee;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--ink); margin: 0; padding: 40px 16px;
    }
    .wrap { max-width: 560px; margin: 0 auto; }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 32px; box-shadow: 0 1px 3px rgba(20,30,50,0.04);
    }
    h1 { margin: 0 0 6px; font-size: 24px; letter-spacing: -0.01em; }
    .sub { color: var(--muted); margin: 0 0 24px; font-size: 14px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #384355; }
    input[type=text], input[type=number], textarea {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
      font: inherit; font-size: 14px; background: #fff; color: var(--ink);
    }
    input:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
    textarea { min-height: 72px; resize: vertical; }
    .field { margin-bottom: 16px; }
    .row { display: grid; grid-template-columns: 1fr 120px; gap: 12px; }
    button {
      background: var(--accent); color: #fff; border: 0; padding: 12px 16px; border-radius: 8px;
      font: inherit; font-weight: 600; font-size: 14px; cursor: pointer; width: 100%;
    }
    button:hover { background: var(--accent-hover); }
    .error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca;
             padding: 10px 12px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
    .hint { color: var(--muted); font-size: 12px; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Practice Booklet Generator</h1>
      <p class="sub">Type the topic and year level for Maths, Science, or English. We'll build a validated booklet.</p>
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      <form method="post" action="/generate">
        <div class="field">
          <label for="description">Topic and year level</label>
          <textarea id="description" name="description" placeholder="e.g. Year 8 maths, fractions and ratios&#10;   Year 9 science, chemical reactions&#10;   Year 10 English, persuasive writing" required></textarea>
          <div class="hint">A short description is fine — no upload needed. Works for maths, science, and English.</div>
        </div>
        <div class="field row">
          <div>
            <label for="student_name">Student name</label>
            <input id="student_name" name="student_name" type="text" placeholder="Alex" required>
          </div>
          <div>
            <label for="questions">Questions / subtopic</label>
            <input id="questions" name="questions" type="number" min="1" max="15" value="5">
          </div>
        </div>
        <button type="submit">Generate booklet</button>
      </form>
    </div>
  </div>
</body>
</html>
